# Railway staging — deploy from Dockerfile (Settings → Connect GitHub repo root)
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Mount in Railway dashboard: Volume → /app/uploads (for attachments)
